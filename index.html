<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinguaLearn — AI Voice Tutor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08080f; color: #eeedf8; font-family: 'Inter', system-ui, sans-serif; }
  select option { background: #1a1a2e; color: #eeedf8; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #08080f; } ::-webkit-scrollbar-thumb { background: #252540; border-radius: 4px; }
  button:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const LANGUAGES = [
  { code:"en", flag:"🇺🇸", label:"English",    voice:"en-US" },
  { code:"es", flag:"🇪🇸", label:"Spanish",    voice:"es-ES" },
  { code:"fr", flag:"🇫🇷", label:"French",     voice:"fr-FR" },
  { code:"ja", flag:"🇯🇵", label:"Japanese",   voice:"ja-JP" },
  { code:"ar", flag:"🇸🇦", label:"Arabic",     voice:"ar-SA" },
  { code:"de", flag:"🇩🇪", label:"German",     voice:"de-DE" },
  { code:"zh", flag:"🇨🇳", label:"Chinese",    voice:"zh-CN" },
  { code:"pt", flag:"🇧🇷", label:"Portuguese", voice:"pt-BR" },
];
const NATIVE_LANGS = [
  {code:"none",label:"None"},{code:"ur",label:"اردو Urdu"},
  {code:"ps",label:"پښتو Pashto"},{code:"fa",label:"فارسی Persian"},
  {code:"es",label:"Español"},{code:"hi",label:"हिन्दी Hindi"},
  {code:"ru",label:"Русский Russian"},{code:"ar",label:"العربية Arabic"},
];
const LEVELS = [
  {id:"beginner",   icon:"🌱",label:"Beginner",    desc:"Greetings, basics & survival phrases"},
  {id:"intermediate",icon:"🔥",label:"Intermediate",desc:"Debates, stories & workplace talk"},
  {id:"advanced",   icon:"⚡",label:"Advanced",    desc:"Idioms, accent reduction & expert scenarios"},
];
const SCENARIOS = [
  {id:"free",     icon:"💬",label:"Free Talk",  desc:"Open conversation, any topic",          color:"#7c6af7"},
  {id:"traveler", icon:"✈️", label:"Traveler",  desc:"Airports, hotels, directions",          color:"#3ddba4"},
  {id:"career",   icon:"💼",label:"Career",     desc:"Job interviews, emails, presentations", color:"#f7a76a"},
  {id:"exam",     icon:"📝",label:"Exam Prep",  desc:"TOEFL / IELTS timed simulations",       color:"#f76c6c"},
  {id:"daily",    icon:"☀️", label:"Daily Life", desc:"Hobbies, movies, trends",               color:"#6ac5f7"},
  {id:"lesson",   icon:"📚",label:"Lesson",     desc:"Structured grammar & vocab",            color:"#c46af7"},
  {id:"interview",icon:"🎙️",label:"Interview",  desc:"Q&A about your life & interests",       color:"#f76ca8"},
  {id:"story",    icon:"📖",label:"Story",      desc:"Build a story together",                color:"#f7d86a"},
];
const NAV = [{id:"home",icon:"🏠",label:"Home"},{id:"learn",icon:"🎓",label:"Learn"},{id:"call",icon:"📞",label:"Call"},{id:"progress",icon:"📊",label:"Progress"}];

const C = {
  bg:"#08080f",card:"#111120",surface:"#1a1a2e",border:"#252540",
  accent:"#7c6af7",accentGlow:"rgba(124,106,247,0.3)",accentLight:"#a99ef9",
  green:"#3ddba4",greenGlow:"rgba(61,219,164,0.3)",red:"#f76c6c",
  text:"#eeedf8",muted:"#6b6a86",mutedLight:"#9998b8",white:"#ffffff",
};

const cw = s => s.trim().split(/\s+/).filter(Boolean).length;
const ft = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

function buildPrompt(lang, native, level, scenario) {
  const lm = {beginner:"complete beginner",intermediate:"intermediate learner",advanced:"advanced speaker"};
  const sm = {
    free:"Have a natural conversation on any topic.",
    traveler:"Simulate travel: airports, hotels, ordering food, directions.",
    career:"Practice professional skills: interviews, emails, presentations.",
    exam:"Simulate TOEFL/IELTS. Ask one question, evaluate, give score & tips.",
    daily:"Chat about everyday life: hobbies, movies, tech, food.",
    lesson:"Teach grammar & vocabulary in a structured way with examples.",
    interview:"Ask conversational questions about the user's life and opinions.",
    story:"Build a story together, taking turns adding 2–3 sentences each.",
  };
  const nn = native!=="none"?` User's native language: ${native}; offer brief translations when helpful.`:"";
  return `You are Nova, a warm expert AI language tutor helping the user practice ${lang.label}.
User level: ${lm[level]}.${nn}
Mode: ${sm[scenario]}
Rules:
- Speak primarily in ${lang.label}, matching complexity to level.
- Keep each reply to 2–4 sentences — this is a voice conversation.
- Gently correct mistakes by modeling correct usage inline.
- After EVERY user response add a one-line note in brackets: [✓ Great!] or [💡 Try: "X" instead of "Y"]
- Be warm, encouraging, energetic.
- Open with a greeting in ${lang.label} and explain today's plan.`;
}

// ── MAIN ────────────────────────────────────────────────────────────────────
function App() {
  const [targetLang, setTargetLang] = useState(LANGUAGES[0]);
  const [nativeLang, setNativeLang]  = useState("none");
  const [level,      setLevel]       = useState("beginner");
  const [scenario,   setScenario]    = useState("free");
  const [tab,        setTab]         = useState("home");

  const [totalWords,    setTotalWords]    = useState(0);
  const [totalTurns,    setTotalTurns]    = useState(0);
  const [totalSessions, setTotalSessions] = useState(0);
  const [streak]                          = useState(3);
  const [history,       setHistory]       = useState([]);

  const [callActive,   setCallActive]   = useState(false);
  const [messages,     setMessages]     = useState([]);
  const [novaText,     setNovaText]     = useState("");
  const [userText,     setUserText]     = useState("");
  const [feedback,     setFeedback]     = useState("");
  const [callStatus,   setCallStatus]   = useState("idle");
  const [sessWords,    setSessWords]    = useState(0);
  const [sessTurns,    setSessTurns]    = useState(0);
  const [elapsed,      setElapsed]      = useState(0);
  const [retry,        setRetry]        = useState(false);

  const synth   = useRef(window.speechSynthesis);
  const recRef  = useRef(null);
  const timerR  = useRef(null);
  const msgRef  = useRef([]);
  const statRef = useRef("idle");

  useEffect(()=>{ msgRef.current  = messages;  },[messages]);
  useEffect(()=>{ statRef.current = callStatus; },[callStatus]);
  useEffect(()=>{
    if(callActive){ timerR.current = setInterval(()=>setElapsed(e=>e+1),1000); }
    return ()=>clearInterval(timerR.current);
  },[callActive]);

  const speak = useCallback((text,onEnd)=>{
    synth.current.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\[.*?\]/g,""));
    const vs = synth.current.getVoices();
    const m  = vs.find(v=>v.lang.startsWith(targetLang.voice.slice(0,5)));
    if(m) u.voice=m; u.lang=targetLang.voice; u.rate=0.9;
    u.onend=onEnd||null; synth.current.speak(u);
  },[targetLang]);

  const callNova = useCallback(async(userMsg,opener=false)=>{
    setCallStatus("thinking"); setRetry(false);
    const hist = msgRef.current;
    const newH = opener
      ? [{role:"user",content:`Greet me in ${targetLang.label} and explain today's plan.`}]
      : [...hist,{role:"user",content:userMsg}];
    if(!opener){
      setMessages(newH);
      setSessTurns(t=>t+1); setTotalTurns(t=>t+1);
      setSessWords(w=>w+cw(userMsg)); setTotalWords(w=>w+cw(userMsg));
    }
    try{
      const res  = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          system:buildPrompt(targetLang,nativeLang,level,scenario),messages:newH}),
      });
      const data = await res.json();
      const reply= data.content?.map(b=>b.text||"").join("")||"Let me try again.";
      const fb   = (reply.match(/\[([^\]]+)\]/)||[])[1]||"";
      const upd  = [...newH,{role:"assistant",content:reply}];
      setMessages(upd); setNovaText(reply); setFeedback(fb);
      setSessWords(w=>w+cw(reply)); setTotalWords(w=>w+cw(reply));
      setCallStatus("nova-speaking");
      speak(reply,()=>setCallStatus("idle"));
    }catch{
      setNovaText("Connection issue — try again."); setCallStatus("idle"); setRetry(true);
    }
  },[targetLang,nativeLang,level,scenario,speak]);

  const startCall = useCallback(()=>{
    setCallActive(true); setMessages([]); setSessWords(0); setSessTurns(0);
    setElapsed(0); setNovaText(""); setUserText(""); setFeedback(""); setRetry(false);
    setTab("call"); setTotalSessions(s=>s+1);
    callNova("",true);
  },[callNova]);

  const endCall = useCallback(()=>{
    synth.current.cancel(); recRef.current?.stop(); clearInterval(timerR.current);
    setCallActive(false); setCallStatus("idle");
    if(sessTurns>0){
      setHistory(h=>[...h,{lang:targetLang.label,scenario,turns:sessTurns,words:sessWords,duration:elapsed,date:new Date().toLocaleDateString()}].slice(-10));
    }
    setTab("progress");
  },[sessTurns,sessWords,elapsed,targetLang,scenario]);

  const listen = useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setRetry(true);return;}
    const rec=new SR(); rec.lang=targetLang.voice; rec.interimResults=false;
    recRef.current=rec;
    rec.onstart =()=>{setCallStatus("listening");setRetry(false);};
    rec.onresult=(e)=>{const t=e.results[0][0].transcript;setUserText(t);callNova(t);};
    rec.onerror =()=>{setCallStatus("idle");setRetry(true);};
    rec.onend   =()=>{if(statRef.current==="listening"){setCallStatus("idle");setRetry(true);}};
    rec.start();
  },[targetLang,callNova]);

  const handleMic=()=>{ if(callStatus==="idle")listen(); else if(callStatus==="listening")recRef.current?.stop(); };

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{maxWidth:480,margin:"0 auto",paddingBottom:70}}>
        {tab==="home"     && <HomeTab     targetLang={targetLang} streak={streak} totalSessions={totalSessions} totalWords={totalWords} onCall={startCall} onLearn={()=>setTab("learn")}/>}
        {tab==="learn"    && <LearnTab    targetLang={targetLang} setTargetLang={setTargetLang} nativeLang={nativeLang} setNativeLang={setNativeLang} level={level} setLevel={setLevel} scenario={scenario} setScenario={setScenario} onCall={startCall}/>}
        {tab==="call"     && <CallTab     callActive={callActive} targetLang={targetLang} scenario={scenario} novaText={novaText} userText={userText} feedback={feedback} callStatus={callStatus} retry={retry} sessWords={sessWords} sessTurns={sessTurns} elapsed={elapsed} onMic={handleMic} onSkip={()=>{synth.current.cancel();setCallStatus("idle");}} onEnd={endCall} onStart={startCall}/>}
        {tab==="progress" && <ProgressTab totalWords={totalWords} totalTurns={totalTurns} totalSessions={totalSessions} streak={streak} history={history}/>}
      </div>
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",maxWidth:480,margin:"0 auto",zIndex:100}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 0 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,opacity:n.id===tab?1:0.45}}>
            <span style={{fontSize:22}}>{n.icon}</span>
            <span style={{fontSize:10,color:n.id===tab?C.accentLight:C.muted,fontWeight:600}}>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── HOME ────────────────────────────────────────────────────────────────────
function HomeTab({targetLang,streak,totalSessions,totalWords,onCall,onLearn}){
  return(
    <div style={{padding:"0 16px 24px"}}>
      {/* Hero */}
      <div style={{textAlign:"center",padding:"44px 20px 28px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,left:"50%",transform:"translateX(-50%)",width:320,height:320,borderRadius:"50%",background:"radial-gradient(circle,rgba(124,106,247,0.13) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{fontSize:64,marginBottom:10}}>🤖</div>
        <h1 style={{fontSize:32,fontWeight:900,color:C.white,margin:0,letterSpacing:"-1px"}}>LinguaLearn</h1>
        <p style={{color:C.muted,fontSize:13,margin:"8px 0 16px"}}>AI Voice Tutor · 8 Languages · Real-Time Feedback</p>
        <span style={{display:"inline-block",background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,padding:"6px 16px",fontSize:13,fontWeight:600,color:C.accentLight}}>{targetLang.flag} Learning {targetLang.label}</span>
      </div>
      {/* Stats */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {[{l:"Day Streak",v:streak+"🔥"},{l:"Sessions",v:totalSessions},{l:"Words",v:totalWords.toLocaleString()}].map(s=>(
          <div key={s.l} style={{flex:1,background:C.surface,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:20,fontWeight:800,color:C.accentLight}}>{s.v}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3,textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.l}</div>
          </div>
        ))}
      </div>
      <button onClick={onCall}  style={{width:"100%",background:`linear-gradient(135deg,${C.accent},#5a49d6)`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:10,boxShadow:`0 8px 24px ${C.accentGlow}`}}>📞 Start Voice Call</button>
      <button onClick={onLearn} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:14,color:C.text,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:24}}>⚙️ Change Language & Mode</button>
      {/* Modes grid */}
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:10}}>Practice Modes</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:24}}>
        {SCENARIOS.map(s=>(
          <div key={s.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:`2px solid ${s.color}`,borderRadius:12,padding:"10px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:20}}>{s.icon}</span>
            <span style={{fontSize:10,color:C.text,fontWeight:600,textAlign:"center"}}>{s.label}</span>
          </div>
        ))}
      </div>
      {/* Features */}
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:10}}>What You Get</div>
      {[
        ["🎙️","Live Voice AI","Speak naturally — Nova responds in real-time with TTS"],
        ["✅","Instant Feedback","Grammar & pronunciation note after every reply"],
        ["✈️💼📝","8 Scenario Modes","Free Talk, Traveler, Career, Exam, Daily Life & more"],
        ["🌱🔥⚡","3 Skill Levels","Beginner to Advanced — adapts to your pace"],
        ["📊","Progress Tracking","Words, turns, sessions & history all logged"],
      ].map(([ic,ti,de])=>(
        <div key={ti} style={{display:"flex",gap:14,alignItems:"flex-start",padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:20,minWidth:36,textAlign:"center"}}>{ic}</div>
          <div><div style={{fontWeight:700,fontSize:14,color:C.text}}>{ti}</div><div style={{fontSize:12,color:C.muted,marginTop:2,lineHeight:1.4}}>{de}</div></div>
        </div>
      ))}
    </div>
  );
}

// ── LEARN ───────────────────────────────────────────────────────────────────
function LearnTab({targetLang,setTargetLang,nativeLang,setNativeLang,level,setLevel,scenario,setScenario,onCall}){
  const sh={fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:10,marginTop:22};
  return(
    <div style={{padding:"20px 16px 24px"}}>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:4,letterSpacing:"-0.5px"}}>Configure Session</div>
      <p style={{color:C.muted,fontSize:13,marginBottom:4}}>Pick your language, level, and mode.</p>

      <div style={sh}>Language to Learn</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {LANGUAGES.map(l=>(
          <button key={l.code} onClick={()=>setTargetLang(l)} style={{background:l.code===targetLang.code?`${C.accent}22`:C.surface,border:`1.5px solid ${l.code===targetLang.code?C.accent:C.border}`,borderRadius:12,padding:"12px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,outline:"none"}}>
            <span style={{fontSize:24}}>{l.flag}</span>
            <span style={{fontSize:10,color:C.text,fontWeight:500}}>{l.label}</span>
          </button>
        ))}
      </div>

      <div style={sh}>Your Native Language</div>
      <select value={nativeLang} onChange={e=>setNativeLang(e.target.value)} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",cursor:"pointer"}}>
        {NATIVE_LANGS.map(l=><option key={l.code} value={l.code}>{l.label}</option>)}
      </select>

      <div style={sh}>Skill Level</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {LEVELS.map(l=>(
          <button key={l.id} onClick={()=>setLevel(l.id)} style={{display:"flex",alignItems:"center",gap:14,width:"100%",background:l.id===level?`${C.accent}18`:C.surface,border:`1.5px solid ${l.id===level?C.accent:C.border}`,borderRadius:14,padding:"14px 16px",cursor:"pointer",outline:"none"}}>
            <span style={{fontSize:24}}>{l.icon}</span>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text}}>{l.label}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{l.desc}</div>
            </div>
          </button>
        ))}
      </div>

      <div style={sh}>Session Mode</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        {SCENARIOS.map(s=>(
          <button key={s.id} onClick={()=>setScenario(s.id)} style={{background:s.id===scenario?`${s.color}18`:C.surface,border:`1.5px solid ${s.id===scenario?s.color:C.border}`,borderRadius:14,padding:"14px 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",outline:"none"}}>
            <span style={{fontSize:24}}>{s.icon}</span>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginTop:4}}>{s.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2,lineHeight:1.3}}>{s.desc}</div>
          </button>
        ))}
      </div>
      <button onClick={onCall} style={{width:"100%",background:`linear-gradient(135deg,${C.accent},#5a49d6)`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:`0 8px 24px ${C.accentGlow}`}}>📞 Start Session</button>
    </div>
  );
}

// ── CALL ────────────────────────────────────────────────────────────────────
function CallTab({callActive,targetLang,scenario,novaText,userText,feedback,callStatus,retry,sessWords,sessTurns,elapsed,onMic,onSkip,onEnd,onStart}){
  const sc=SCENARIOS.find(s=>s.id===scenario)||SCENARIOS[0];
  if(!callActive) return(
    <div style={{padding:"20px 16px",textAlign:"center",paddingTop:60}}>
      <div style={{fontSize:64,marginBottom:16}}>🤖</div>
      <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>No Active Session</div>
      <div style={{color:C.muted,marginBottom:32,fontSize:14}}>Start a call from Home or the Learn tab</div>
      <button onClick={onStart} style={{width:"100%",background:`linear-gradient(135deg,${C.accent},#5a49d6)`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:16,fontWeight:700,cursor:"pointer"}}>📞 Start Call Now</button>
    </div>
  );
  const speaking = callStatus==="nova-speaking";
  return(
    <div style={{padding:"16px 16px 24px"}}>
      {/* Stats */}
      <div style={{display:"flex",justifyContent:"space-around",background:C.surface,borderRadius:14,padding:"12px 0",marginBottom:14,border:`1px solid ${C.border}`}}>
        {[{v:sessWords,l:"Words"},{v:sessTurns,l:"Turns"},{v:ft(elapsed),l:"Time"}].map(s=>(
          <div key={s.l} style={{textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:C.accentLight}}>{s.v}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.l}</div>
          </div>
        ))}
      </div>
      {/* Mode badge */}
      <div style={{textAlign:"center",marginBottom:14}}>
        <span style={{border:`1px solid ${sc.color}`,color:sc.color,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600,display:"inline-block"}}>{sc.icon} {sc.label} · {targetLang.flag} {targetLang.label}</span>
      </div>
      {/* Avatar */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:14}}>
        <div style={{width:88,height:88,borderRadius:"50%",background:C.surface,border:`2.5px solid ${speaking?C.green:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48,boxShadow:speaking?`0 0 28px ${C.greenGlow}`:"none",transition:"all 0.3s"}}>🤖</div>
        <div style={{color:C.muted,fontSize:12,marginTop:6,fontWeight:600}}>Nova</div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"14px 18px",color:novaText?C.text:C.muted,fontSize:14,lineHeight:1.65,textAlign:"center",maxWidth:320,marginTop:12,fontStyle:novaText?"normal":"italic"}}>
          {novaText?novaText.replace(/\[.*?\]/g,"").trim():"Connecting to Nova…"}
        </div>
      </div>
      {/* Feedback */}
      {feedback&&<div style={{background:"rgba(61,219,164,0.1)",border:"1px solid rgba(61,219,164,0.3)",borderRadius:10,padding:"8px 14px",color:C.green,fontSize:12,fontWeight:600,marginBottom:10,textAlign:"center"}}>{feedback}</div>}
      {/* User */}
      {userText&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}><div style={{background:`${C.accent}22`,border:`1px solid ${C.accent}44`,borderRadius:14,padding:"10px 16px",color:C.accentLight,fontSize:13,maxWidth:260,textAlign:"right"}}>{userText}</div></div>}
      {retry&&<div style={{color:C.red,fontSize:12,textAlign:"center",marginBottom:8}}>↻ Tap 🎤 to try again</div>}
      <div style={{color:C.muted,fontSize:11,textAlign:"center",marginBottom:18,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        <span style={{background:`${C.accent}33`,color:C.accentLight,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700}}>Tip</span>
        Speak clearly after Nova finishes talking.
      </div>
      {/* Controls */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:10}}>
        <button onClick={onSkip} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"50%",width:50,height:50,fontSize:20,cursor:"pointer",color:C.text,display:"flex",alignItems:"center",justifyContent:"center"}}>⏭</button>
        <button onClick={onMic}  style={{background:callStatus==="listening"?C.red:`linear-gradient(135deg,${C.accent},#5a49d6)`,border:"none",borderRadius:"50%",width:76,height:76,fontSize:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:callStatus==="listening"?`0 0 24px rgba(247,108,108,0.5)`:`0 8px 24px ${C.accentGlow}`,transition:"all 0.2s"}}>
          {callStatus==="listening"?"🔴":callStatus==="thinking"?"⏳":"🎤"}
        </button>
        <button onClick={onEnd}  style={{background:"rgba(247,108,108,0.15)",border:"1px solid rgba(247,108,108,0.4)",borderRadius:"50%",width:50,height:50,fontSize:20,cursor:"pointer",color:C.red,display:"flex",alignItems:"center",justifyContent:"center"}}>📵</button>
      </div>
      <div style={{color:C.muted,fontSize:12,textAlign:"center"}}>
        {callStatus==="nova-speaking"&&"🔊 Nova is speaking…"}
        {callStatus==="listening"&&"👂 Listening…"}
        {callStatus==="thinking"&&"💭 Nova is thinking…"}
        {callStatus==="idle"&&"Tap 🎤 to respond"}
      </div>
    </div>
  );
}

// ── PROGRESS ────────────────────────────────────────────────────────────────
function ProgressTab({totalWords,totalTurns,totalSessions,streak,history}){
  const sh={fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:10,marginTop:22};
  return(
    <div style={{padding:"20px 16px 24px"}}>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:20,letterSpacing:"-0.5px"}}>Your Progress</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
        {[{v:streak+"🔥",l:"Day Streak"},{v:totalSessions,l:"Sessions"},{v:totalTurns,l:"Total Turns"},{v:totalWords.toLocaleString(),l:"Total Words"}].map(s=>(
          <div key={s.l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"20px 12px",textAlign:"center"}}>
            <div style={{fontSize:26,fontWeight:900,color:C.accentLight}}>{s.v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={sh}>Recent Sessions</div>
      {history.length===0
        ?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"24px 0"}}>Complete a call to see your history here.</div>
        :[...history].reverse().map((s,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:700,fontSize:14}}>{SCENARIOS.find(x=>x.id===s.scenario)?.icon} {s.lang} · {SCENARIOS.find(x=>x.id===s.scenario)?.label}</div>
              <div style={{color:C.muted,fontSize:11}}>{s.date}</div>
            </div>
            <div style={{display:"flex",gap:16,marginTop:6}}>
              {[s.turns+" turns",s.words+" words",ft(s.duration)].map(x=><span key={x} style={{color:C.muted,fontSize:12}}>{x}</span>)}
            </div>
          </div>
        ))
      }
      <div style={sh}>Tips to Improve</div>
      {["Practice daily — even 10 minutes builds fluency fast.","Use Traveler mode before any trip abroad.","Try Career mode to nail your next job interview.","Exam Prep mode helps with TOEFL & IELTS structure.","Review Nova's [feedback] notes after each session."].map((tip,i)=>(
        <div key={i} style={{color:"#9998b8",fontSize:13,padding:"10px 0",borderBottom:`1px solid ${C.border}`,lineHeight:1.5}}>
          <span style={{color:C.accent,fontWeight:700,marginRight:8}}>{i+1}.</span>{tip}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
