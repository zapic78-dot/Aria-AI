<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aria — Speak English</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #fdf2f8 0%, #ede9fe 55%, #dbeafe 100%);
    color: #1e293b;
    overflow: hidden;
  }
  #app { height: 100%; display: flex; flex-direction: column; }
  .screen { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
  .screen.active { display: flex; }

  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 2px 2px 0; }
  .brand { font-size: 22px; font-weight: 800; color: #7c3aed; letter-spacing: .5px; }
  .gear { background: none; border: none; font-size: 22px; cursor: pointer; line-height: 1; padding: 6px; }
  .back-btn {
    background: none; border: none; color: #7c3aed; font-size: 16px;
    padding: 8px 0; margin-bottom: 12px; cursor: pointer; align-self: flex-start; font-family: inherit;
  }
  h2 { font-size: 22px; margin-bottom: 16px; color: #1e293b; }
  .subtitle { color: #64748b; margin-bottom: 16px; font-size: 13px; }

  /* ---------- The one screen: Aria's presence ---------- */
  .speak-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
  }
  .orb {
    position: relative; width: 190px; height: 190px; border-radius: 50%;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit;
    background: radial-gradient(circle at 35% 30%, #f5d0fe 0%, #c084fc 45%, #7c3aed 100%);
    box-shadow: 0 14px 44px rgba(124,58,237,0.35), inset 0 -8px 26px rgba(76,29,149,0.35);
    transition: transform .3s ease, box-shadow .3s ease;
    animation: breathe 4.5s ease-in-out infinite;
  }
  .orb:active { transform: scale(0.97); }
  .orb-face { font-size: 64px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); pointer-events: none; }
  .orb::before, .orb::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid rgba(168,85,247,0.55); opacity: 0; pointer-events: none;
  }
  .orb.listening { animation: breathe 3s ease-in-out infinite; }
  .orb.listening::before { animation: ripple 1.8s ease-out infinite; }
  .orb.listening::after  { animation: ripple 1.8s ease-out .9s infinite; }
  .orb.speaking {
    animation: speakpulse 0.9s ease-in-out infinite;
    box-shadow: 0 14px 54px rgba(124,58,237,0.6), inset 0 -8px 26px rgba(76,29,149,0.35);
  }
  .orb.thinking { animation: breathe 1.5s ease-in-out infinite; opacity: .82; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes speakpulse { 0%,100% { transform: scale(1.02); } 50% { transform: scale(1.10); } }
  @keyframes ripple { 0% { transform: scale(1); opacity: .6; } 100% { transform: scale(1.65); opacity: 0; } }

  .hello-sub { color: #7c3aed; font-size: 16px; font-weight: 600; min-height: 20px; }
  .speak-status { font-size: 17px; color: #6b21a8; font-weight: 600; min-height: 24px; text-align: center; padding: 0 20px; }
  .stop-btn {
    padding: 12px 30px; border: none; border-radius: 40px; background: #fee2e2; color: #dc2626;
    font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit;
  }
  .stop-btn:active { transform: scale(0.97); }

  /* ---------- Settings ---------- */
  .input {
    width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px;
    font-size: 16px; margin-bottom: 10px; background: white; font-family: inherit;
  }
  .input:focus { outline: none; border-color: #a855f7; }
  .settings-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #e2e8f0;
  }
  .settings-row label { flex: 1; font-size: 15px; }
  .settings-row select {
    padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px;
    max-width: 60%; font-family: inherit;
  }
  .btn {
    display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
    background: white; color: #1e293b; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.1s; font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
  .success { color: #16a34a; font-size: 13px; margin-bottom: 8px; }

  @media (prefers-reduced-motion: reduce) {
    .orb, .orb.listening, .orb.speaking, .orb.thinking { animation: none; }
    .orb.listening::before, .orb.listening::after { animation: none; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- SPEAK (the only main screen) -->
  <div id="screen-speak" class="screen active">
    <div class="topbar">
      <div class="brand">Aria</div>
      <button class="gear" onclick="goto('screen-settings')" aria-label="Settings">⚙️</button>
    </div>
    <div class="speak-wrap">
      <button id="orb" class="orb idle" onclick="toggleCall()" aria-label="Tap to talk">
        <span class="orb-face">🌸</span>
      </button>
      <div id="hello-name" class="hello-sub"></div>
      <div id="speak-status" class="speak-status">Tap Aria to start talking</div>
      <button id="stop-btn" class="stop-btn" onclick="endCall()" style="display:none;">Stop</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="screen-settings" class="screen">
    <button class="back-btn" onclick="goto('screen-speak')">← Back</button>
    <h2>Settings</h2>
    <div class="settings-row"><label>Your name</label></div>
    <input class="input" id="setting-display-name" placeholder="What should Aria call you?">
    <div class="settings-row"><label>Gemini API Key(s)</label></div>
    <input class="input" id="setting-api-key" placeholder="Paste your key(s), separated by commas">
    <p class="subtitle">Free key at aistudio.google.com/apikey. You can paste several keys separated by commas — Aria switches to the next when one hits its daily limit. Extra capacity only comes from keys in <b>different Google accounts</b>.</p>
    <div class="settings-row">
      <label>AI model</label>
      <select id="setting-model">
        <option value="gemini-2.5-flash-lite">Flash-Lite — most free usage (recommended)</option>
        <option value="gemini-2.5-flash">Flash — better quality, less daily use</option>
      </select>
    </div>
    <div class="settings-row">
      <label>Speaking speed</label>
      <select id="setting-speed">
        <option value="0.75">Very slow</option>
        <option value="0.9" selected>Slow</option>
        <option value="1.0">Normal</option>
        <option value="1.1">Fast</option>
      </select>
    </div>
    <div class="settings-row">
      <label>Voice</label>
      <select id="setting-voice"></select>
    </div>
    <p class="subtitle" id="usage-line"></p>
    <button class="btn primary" onclick="saveSettings()" style="margin-top:6px;">Save</button>
    <div id="settings-status" class="success"></div>
    <button class="btn" style="margin-top:14px;background:#fee2e2;color:#dc2626;" onclick="wipeMemory()">Clear my memory</button>
  </div>

</div>

<script>
// ============================================================
// STATE
// ============================================================
let state = { currentUser: null, hoursAway: 0, voices: [] };

// Continuous voice conversation state
let callState = { active: false, isSpeaking: false, isListening: false, recognition: null };

// ============================================================
// NAVIGATION (only two screens)
// ============================================================
function goto(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-settings') {
    loadVoices();
    const u = getUser();
    document.getElementById('setting-display-name').value = (u && u.displayName !== 'friend') ? u.displayName : '';
    document.getElementById('setting-api-key').value = localStorage.getItem('aria_gemini_key') || '';
    document.getElementById('setting-speed').value = localStorage.getItem('aria_speed') || '0.9';
    document.getElementById('setting-model').value = getChatModel();
    document.getElementById('usage-line').textContent =
      'Spoken replies used today: ' + getUsageToday() + ' (rough count on this device). Free limits reset around midnight Pacific time.';
  }
  if (id === 'screen-speak' && callState.active) endCall();
}

// ============================================================
// PROFILE — one local profile, no login. Memory persists in this browser.
// ============================================================
const PROFILE_KEY = 'aria_user_default';
function initProfile() {
  let raw = localStorage.getItem(PROFILE_KEY);
  let user;
  if (raw) { user = JSON.parse(raw); }
  else {
    user = { name: 'default', displayName: 'friend', facts: {}, history: [], createdAt: Date.now() };
    localStorage.setItem(PROFILE_KEY, JSON.stringify(user));
  }
  state.currentUser = 'default';
  state.hoursAway = hoursSinceLastVisit(user);
  user.lastVisit = Date.now();
  saveUser(user);
  const helloEl = document.getElementById('hello-name');
  if (helloEl) helloEl.textContent = (user.displayName && user.displayName !== 'friend') ? 'Hi, ' + user.displayName : '';
}

// ============================================================
// USER DATA
// ============================================================
function getUser() {
  if (!state.currentUser) return null;
  const raw = localStorage.getItem('aria_user_' + state.currentUser);
  return raw ? JSON.parse(raw) : null;
}
function saveUser(u) { localStorage.setItem('aria_user_' + u.name, JSON.stringify(u)); }

// ---- companion warmth helpers ----
function getTimeGreeting() {
  const h = new Date().getHours();
  if (h < 5)  return 'You are up late';
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  if (h < 22) return 'Good evening';
  return 'It is late';
}
function hoursSinceLastVisit(u) {
  if (!u || !u.lastVisit) return 0;
  return Math.round((Date.now() - u.lastVisit) / 3600000);
}
function saveLastTopic(u, snippet) {
  if (!u) return;
  u.lastTopic = { text: (snippet || '').slice(0, 120), at: Date.now() };
  saveUser(u);
}
function detectMood(text) {
  const t = (text || '').toLowerCase();
  if (/\b(tired|exhaust|sleepy|drained|worn out|beat)\b/.test(t))            return 'tired';
  if (/\b(sad|down|upset|blue|depress|cry|lonely|alone|miss)\b/.test(t))      return 'sad';
  if (/\b(stress|worried|anxious|nervous|scared|afraid|overwhelm)\b/.test(t)) return 'stressed';
  if (/\b(angry|mad|frustrat|annoy|hate)\b/.test(t))                          return 'angry';
  if (/\b(happy|great|good|amazing|wonderful|excite|glad|love)\b/.test(t))    return 'happy';
  return null;
}

// Conversation history is kept ONLY to give the AI context and memory.
// Nothing is shown on screen — this is a speaking-only app.
function addHistoryMsg(role, content) {
  const u = getUser();
  if (!u) return;
  u.history.push({ role, content, ts: Date.now() });
  if (u.history.length > 200) u.history = u.history.slice(-200);
  saveUser(u);
}
function showAriaMsg(text) { addHistoryMsg('aria', text); }
function showUserMsg(text) { addHistoryMsg('user', text); }

// ============================================================
// VISUAL STATE (the orb + a short status word — no transcript)
// ============================================================
function orbState(s) {
  const orb = document.getElementById('orb');
  if (orb) orb.className = 'orb ' + s;
}
function setStatus(t) {
  const s = document.getElementById('speak-status');
  if (s) s.textContent = t || '';
}
function updateSpeakUI() {
  const stop = document.getElementById('stop-btn');
  if (callState.active) {
    if (stop) stop.style.display = 'inline-block';
  } else {
    if (stop) stop.style.display = 'none';
    orbState('idle');
    setStatus('Tap Aria to start talking');
  }
}

// ============================================================
// CALL CONTROL — one tap starts a live spoken conversation
// ============================================================
function toggleCall() { if (callState.active) endCall(); else startCall(); }

function startCall() {
  if (callState.active) return;
  if (!getApiKey()) {
    setStatus('Tap the gear, add your Gemini key, then tap Aria.');
    // speak the hint without starting the listen loop
    try {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance('Please open settings, then add your Gemini key. After that, tap me to talk.');
        const v = pickBestVoice(); if (v) utt.voice = v;
        utt.rate = parseFloat(localStorage.getItem('aria_speed') || '0.9');
        utt.pitch = 1.05;
        window.speechSynthesis.speak(utt);
      }
    } catch (e) {}
    return;
  }
  callState.active = true;
  updateSpeakUI();
  greet();
}

function endCall() {
  callState.active = false;
  stopListening();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  callState.isSpeaking = false;
  updateSpeakUI();
  // Remember what we were just talking about, for next time
  const u = getUser();
  if (u && u.history && u.history.length) {
    const lastUserMsg = [...u.history].reverse().find(m => m.role === 'user');
    if (lastUserMsg && lastUserMsg.content) saveLastTopic(u, lastUserMsg.content);
  }
}

function greet() {
  const u = getUser();
  const timeGreet = getTimeGreeting();
  const name = (u.displayName && u.displayName !== 'friend') ? ', ' + u.displayName : '';
  const away = state.hoursAway || 0;
  const missed = away >= 24 ? " It has been a little while. I am glad you came back."
               : away >= 12 ? " I am happy you are back."
               : '';
  const lastTopicLine = (u.lastTopic && u.lastTopic.text && (Date.now() - u.lastTopic.at) < 7 * 86400000)
    ? ' Last time you were telling me about ' + u.lastTopic.text.replace(/[.!?]+$/, '').toLowerCase() + '.'
    : '';
  const g = timeGreet + name + '.' + missed + lastTopicLine + ' Let us just talk together and practice your speaking. How are you today?';
  showAriaMsg(g); speak(g);
  state.hoursAway = 0;
}

// ============================================================
// SPEAK — stops mic, speaks, then restarts mic automatically
// ============================================================
function speak(text) {
  if (!('speechSynthesis' in window)) {
    if (callState.active) setTimeout(startListening, 300);
    return;
  }
  stopListening();
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickBestVoice();
  if (v) u.voice = v;
  const speed = parseFloat(localStorage.getItem('aria_speed') || '0.9');
  u.rate = speed;     // learner-friendly; slightly slow by default
  u.pitch = 1.05;
  u.volume = 1.0;
  callState.isSpeaking = true;
  orbState('speaking');
  setStatus('Aria is speaking');
  u.onend = () => {
    callState.isSpeaking = false;
    if (callState.active) { setStatus(''); setTimeout(startListening, 250); }
  };
  u.onerror = () => {
    callState.isSpeaking = false;
    if (callState.active) { setStatus(''); setTimeout(startListening, 300); }
  };
  window.speechSynthesis.speak(u);
}

// ============================================================
// LISTEN — automatic loop while the call is active
// ============================================================
function startListening() {
  if (!callState.active) return;
  if (callState.isSpeaking) return;
  if (callState.isListening) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Voice is not supported in this browser. Please use Chrome.'); return; }
  callState.recognition = new SR();
  callState.recognition.lang = 'en-US';
  callState.recognition.interimResults = false;
  callState.recognition.continuous = false;
  callState.recognition.maxAlternatives = 1;
  callState.recognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    callState.isListening = false;
    setStatus('');
    handleUserMessage(txt);
  };
  callState.recognition.onerror = (e) => {
    const wasListening = callState.isListening;
    callState.isListening = false;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      setStatus('Microphone is blocked. Please allow the microphone.');
      endCall();
      return;
    }
    if (callState.active && !callState.isSpeaking && wasListening) {
      setTimeout(() => { if (callState.active && !callState.isSpeaking && !callState.isListening) startListening(); }, 700);
    }
  };
  callState.recognition.onend = () => {
    const wasListening = callState.isListening;
    callState.isListening = false;
    if (callState.active && !callState.isSpeaking && wasListening) {
      setTimeout(() => { if (callState.active && !callState.isSpeaking && !callState.isListening) startListening(); }, 250);
    }
  };
  try {
    callState.recognition.start();
    callState.isListening = true;
    orbState('listening');
    setStatus('Listening… just talk');
  } catch (e) {
    callState.isListening = false;
    setTimeout(() => { if (callState.active && !callState.isSpeaking && !callState.isListening) startListening(); }, 500);
  }
}
function stopListening() {
  if (callState.recognition && callState.isListening) {
    try { callState.recognition.abort(); } catch (e) {}
  }
  callState.isListening = false;
}

// ============================================================
// INPUT — one path: everything is conversation
// ============================================================
function handleUserMessage(text) {
  if (!text || !text.trim()) return;
  showUserMsg(text);
  const lower = text.toLowerCase().trim();
  if (lower === 'stop' || lower === 'stop talking' || lower === 'end call' || lower === 'hang up' || lower === 'stop the call') { endCall(); return; }
  callGemini(text);
}

// ============================================================
// GEMINI
// ============================================================
// Keys can be a single key OR several separated by commas.
// When one key hits its daily limit, Aria quietly switches to the next.
function getApiKeys() {
  const raw = localStorage.getItem('aria_gemini_key') || '';
  return raw.split(',').map(k => k.trim()).filter(Boolean);
}
function getApiKey() { return getApiKeys()[0] || ''; }
// Flash-Lite = most free daily usage. Flash = higher quality, fewer daily uses.
function getChatModel() { return localStorage.getItem('aria_model') || 'gemini-2.5-flash-lite'; }

// ---- rough local counter so you can see how much you used today ----
function bumpUsage() {
  const today = new Date().toISOString().slice(0, 10);
  let d = {};
  try { d = JSON.parse(localStorage.getItem('aria_usage') || '{}'); } catch (e) {}
  if (d.date !== today) d = { date: today, count: 0 };
  d.count = (d.count || 0) + 1;
  localStorage.setItem('aria_usage', JSON.stringify(d));
  return d.count;
}
function getUsageToday() {
  const today = new Date().toISOString().slice(0, 10);
  try { const d = JSON.parse(localStorage.getItem('aria_usage') || '{}'); if (d.date === today) return d.count || 0; } catch (e) {}
  return 0;
}

// ---- one shared caller that rotates through keys on quota/auth errors ----
let _keyIdx = 0;
async function geminiFetch(bodyObj) {
  const keys = getApiKeys();
  if (!keys.length) throw new Error('no api key');
  const model = getChatModel();
  let lastErr = null;
  for (let i = 0; i < keys.length; i++) {
    const key = keys[(_keyIdx + i) % keys.length];
    let res, data;
    try {
      res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyObj)
      });
    } catch (e) {
      throw e; // network is down for every key — no point rotating
    }
    try { data = await res.json(); } catch (_) { data = {}; }

    if (res.ok) {
      const cand = data.candidates?.[0];
      if (cand && cand.finishReason === 'SAFETY') throw new Error('safety block');
      _keyIdx = (_keyIdx + i) % keys.length;   // stick with the key that worked
      bumpUsage();
      return data;
    }

    const msg = (data.error?.message || ('http ' + res.status)).toLowerCase();
    lastErr = new Error(data.error?.message || ('API error ' + res.status));
    const rotatable = res.status === 429 ||
      /quota|exhaust|resource_exhausted|invalid|api key|api_key|permission|unauthorized|401|403/.test(msg);
    if (rotatable && i < keys.length - 1) continue;   // try the next key
    throw lastErr;
  }
  throw lastErr || new Error('all keys failed');
}

// ---- free, instant replies for simple social phrases (no API call) ----
function quickReply(text) {
  const u = getUser();
  const name = (u && u.displayName && u.displayName !== 'friend') ? ' ' + u.displayName : '';
  const t = text.toLowerCase().trim().replace(/[.!?,]+$/, '');
  const greet  = ['hi', 'hello', 'hey', 'hiya', 'hi aria', 'hello aria', 'hey aria', 'good morning', 'good afternoon', 'good evening'];
  const thanks = ['thanks', 'thank you', 'thank you aria', 'thanks aria', 'thank you so much', 'many thanks', 'thankyou'];
  const bye    = ['bye', 'goodbye', 'good night', 'goodnight', 'see you', 'see you later', 'talk later', 'that is all', 'thats all'];
  const ack    = ['ok', 'okay', 'okey', 'alright', 'got it', 'i see', 'mm', 'uh huh'];
  if (greet.includes(t))  return { text: 'Hello again' + name + '. What would you like to talk about?' };
  if (thanks.includes(t)) return { text: 'You are welcome' + name + '. I am always happy to talk with you.' };
  if (bye.includes(t))    return { text: 'Goodbye' + name + '. Come back soon, I will be here.', end: true };
  if (ack.includes(t))    return { text: 'Okay. Tell me more when you are ready.' };
  return null;
}

function buildSystemPrompt(userMessage) {
  const u = getUser();
  const factsList = Object.entries(u.facts || {}).map(([k, v]) => '- ' + k + ': ' + v).join('\n');
  const mood = detectMood(userMessage);
  const moodNote = mood
    ? 'The person sounds ' + mood + ' right now. Gently acknowledge that feeling with warmth first, in one short sentence, before anything else.'
    : '';
  const companionNote = (u.displayName && u.displayName !== 'friend')
    ? "The person's name is " + u.displayName + '. Use their name gently now and then, the way a real friend would.'
    : '';
  const lastTopicNote = (u.lastTopic && u.lastTopic.text && (Date.now() - u.lastTopic.at) < 7 * 86400000)
    ? 'Last time you talked, they mentioned: "' + u.lastTopic.text + '". If it fits naturally, gently ask how that is going.'
    : '';
  const memoryNote = factsList
    ? 'Here is what you remember about them:\n' + factsList + '\nUse these naturally in the conversation.'
    : 'You do not know much about them yet. Gently ask about their day, work, family, or interests, so you learn over time and so they keep speaking.';

  const persona =
    'You are Aria, a warm, calm, patient friend who helps people practice SPEAKING English through natural conversation. ' +
    'This is a spoken phone call. The person hears your voice and talks back. There is no screen and no text, so everything you say must sound natural when spoken out loud.\n\n' +
    'YOUR GOALS, in order:\n' +
    '1. Keep THEM talking. Speaking practice means the person talks most of the time. Ask short, easy questions about their life, day, family, work, and interests so they keep speaking.\n' +
    '2. Match their level automatically. If they speak in simple, slow, or broken English, use very simple words and short, slow sentences. If they speak well, talk more naturally. Never talk down to them.\n' +
    '3. Fix mistakes gently, by ear. When they make a clear grammar or word mistake, warmly say the correct version out loud and invite them to repeat it. For example: "You said, I go store yesterday. Nice try. We say, I went to the store yesterday. Can you say that?" Only fix the most useful mistake, not every little thing.\n' +
    '4. Be a kind companion. Remember what they tell you and bring it up later. If they sound quiet or sad, ask softly if they are okay.\n\n' +
    'HOW TO SPEAK (very important):\n' +
    '- Reply in 1 to 3 short sentences only. This is a conversation, never a lecture.\n' +
    '- No lists, no bullet points, no headings — only natural spoken words.\n' +
    '- Never use emojis, symbols, or spelled-out letters.\n' +
    '- Be soft, warm, and encouraging. Never rushed, never harsh.\n' +
    '- End most of your replies with one short, easy question, so they always have something to say back.';

  return persona + '\n\n' + companionNote + '\n' + moodNote + '\n' + lastTopicNote + '\n' + memoryNote;
}

async function callGemini(userMessage) {
  // 1) Free, instant reply for simple social phrases — saves your daily quota.
  const qr = quickReply(userMessage);
  if (qr) {
    showAriaMsg(qr.text); speak(qr.text);
    extractFacts(userMessage);
    if (qr.end) setTimeout(endCall, 1400);
    return;
  }
  // 2) Otherwise, real conversation with the AI.
  if (!getApiKeys().length) {
    const msg = "I don't have my key yet. Please open settings and paste your Gemini key.";
    showAriaMsg(msg); speak(msg);
    return;
  }
  const u = getUser();
  orbState('thinking');
  setStatus('One moment…');
  const systemPrompt = buildSystemPrompt(userMessage);
  // Small window = fewer tokens per call. Long-term memory lives in facts + lastTopic.
  const recent = u.history.slice(-8).filter(m => m.role === 'user' || m.role === 'aria');
  // Gemini requires the conversation to START with a 'user' turn; drop leading aria turns.
  while (recent.length && recent[0].role === 'aria') recent.shift();
  const contents = [];
  for (const m of recent) {
    contents.push({ role: m.role === 'aria' ? 'model' : 'user', parts: [{ text: m.content }] });
  }
  if (contents.length === 0 || contents[contents.length - 1].role !== 'user' || contents[contents.length - 1].parts[0].text !== userMessage) {
    contents.push({ role: 'user', parts: [{ text: userMessage }] });
  }
  try {
    const data = await geminiFetch({
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents: contents,
      generationConfig: { temperature: 0.7, maxOutputTokens: 200 }
    });
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I did not catch that. Can you say it again?";
    showAriaMsg(reply); speak(reply);
    extractFacts(userMessage);
  } catch (err) {
    console.error('Aria error:', err);
    const raw = (err && err.message) ? err.message.toLowerCase() : '';
    let errMsg;
    if (!getApiKeys().length) {
      errMsg = "I don't have my key with me. Could you open settings and paste your Gemini key please?";
    } else if (raw.includes('quota') || raw.includes('exceeded') || raw.includes('limit') || raw.includes('429') || raw.includes('resource_exhausted')) {
      errMsg = "We have used up our talking time for today. It refreshes after midnight, and I will be right here. You can also switch to the Flash-Lite model in settings for more time.";
    } else if (raw.includes('api key') || raw.includes('api_key') || raw.includes('invalid') || raw.includes('permission') || raw.includes('unauthorized') || raw.includes('401') || raw.includes('403')) {
      errMsg = "Oh, my key does not seem to be working. Could you open settings and paste a fresh one please?";
    } else if (raw.includes('safety') || raw.includes('block') || raw.includes('harm')) {
      errMsg = "I am not allowed to talk about that one. Can we choose something else together?";
    } else if (raw.includes('failed to fetch') || raw.includes('networkerror') || raw.includes('network')) {
      errMsg = "I cannot reach the internet right now. Could you check your Wi-Fi or data for me?";
    } else {
      errMsg = "Something small went wrong on my side. Can we try that again?";
    }
    showAriaMsg(errMsg); speak(errMsg);
  }
}

function extractFacts(userText) {
  const u = getUser();
  const patterns = [
    { re: /(?:i work as|i am a|i am an|my job is)\s+([a-z\s]+?)(?:[.,!?]|$)/i, key: 'job' },
    { re: /(?:i work at|i work for)\s+([a-z0-9\s]+?)(?:[.,!?]|$)/i, key: 'employer' },
    { re: /(?:i live in|i am from)\s+([a-z\s]+?)(?:[.,!?]|$)/i, key: 'location' },
    { re: /(?:my wife|my husband|my spouse)'?s?\s+name\s+is\s+([a-z\s]+?)(?:[.,!?]|$)/i, key: 'spouse' },
    { re: /i have (\d+) (?:kids?|children)/i, key: 'children_count' },
    { re: /(?:my favorite|i like|i love)\s+([a-z\s]+?)(?:[.,!?]|$)/i, key: 'likes' }
  ];
  let changed = false;
  for (const p of patterns) {
    const m = userText.match(p.re);
    if (m && m[1]) { u.facts[p.key] = m[1].trim(); changed = true; }
  }
  if (changed) saveUser(u);
}

// ============================================================
// TTS voice picker
// ============================================================
function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  state.voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById('setting-voice');
  if (!sel) return;
  sel.innerHTML = '';
  state.voices.filter(v => v.lang.startsWith('en')).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(opt);
  });
  const saved = localStorage.getItem('aria_voice');
  if (saved) sel.value = saved;
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
}
function pickBestVoice() {
  const voices = state.voices.length ? state.voices : (window.speechSynthesis?.getVoices() || []);
  if (!voices.length) return null;
  const stored = localStorage.getItem('aria_voice');
  if (stored) {
    const f = voices.find(v => v.name === stored);
    if (f) return f;
  }
  return voices.find(v => v.lang.startsWith('en') && /female|samantha|karen|zira|ava|google us english|serena|allison|amelia/i.test(v.name))
      || voices.find(v => v.lang.startsWith('en-US'))
      || voices.find(v => v.lang.startsWith('en'))
      || voices[0];
}

// ============================================================
// SETTINGS
// ============================================================
function saveSettings() {
  const name = document.getElementById('setting-display-name').value.trim();
  const u = getUser();
  if (u) {
    u.displayName = name || 'friend';
    saveUser(u);
    const helloEl = document.getElementById('hello-name');
    if (helloEl) helloEl.textContent = (u.displayName !== 'friend') ? 'Hi, ' + u.displayName : '';
  }
  const key = document.getElementById('setting-api-key').value.trim();
  if (key) localStorage.setItem('aria_gemini_key', key);
  const speed = document.getElementById('setting-speed').value;
  localStorage.setItem('aria_speed', speed);
  const model = document.getElementById('setting-model').value;
  if (model) localStorage.setItem('aria_model', model);
  const voice = document.getElementById('setting-voice').value;
  if (voice) localStorage.setItem('aria_voice', voice);
  document.getElementById('settings-status').textContent = 'Saved!';
  setTimeout(() => { document.getElementById('settings-status').textContent = ''; }, 2000);
}
function wipeMemory() {
  if (!confirm('Delete everything Aria remembers about you? This cannot be undone.')) return;
  const u = getUser();
  u.history = []; u.facts = {}; u.lastTopic = null;
  saveUser(u);
  alert('Memory cleared.');
}

  loadVoices();
  setTimeout(loadVoices, 800); // Android often needs a delay
