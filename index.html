<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1340" />
<title>LinguaCall — Speak Urdu or Pashto, Practice English</title>
<style>
  :root{
    --bg-deep:#070b22;
    --bg-mid:#0d1640;
    --accent:#3aa0ff;
    --accent-soft:#214a8f;
    --accent-glow:#5fc3ff;
    --text:#eaf1ff;
    --text-dim:#8ea3c9;
    --danger:#ff6b6b;
    --ok:#52e0a4;
    --pill-bg:#101c47;
    --pill-active:#2f7fe0;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 50% 0%, #142a6e 0%, var(--bg-mid) 38%, var(--bg-deep) 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:max(20px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    overflow-x:hidden;
  }

  .wrap{ width:100%; max-width:480px; display:flex; flex-direction:column; flex:1; }

  /* Header */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 2px 18px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:34px; height:34px; border-radius:10px;
    background:linear-gradient(145deg, var(--accent-glow), var(--accent-soft));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px; color:#06122e;
    box-shadow:0 0 18px rgba(95,195,255,.45);
  }
  .brand-name{ font-weight:700; font-size:18px; letter-spacing:.2px; }
  .status-pill{
    display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--text-dim);
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px 12px; border-radius:999px;
  }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:var(--text-dim); flex-shrink:0; }
  .status-pill.connected .status-dot{ background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .status-pill.error .status-dot{ background:var(--danger); box-shadow:0 0 8px var(--danger); }
  .status-pill.busy .status-dot{ background:var(--accent-glow); box-shadow:0 0 8px var(--accent-glow); animation:pulse-dot 1s infinite; }
  @keyframes pulse-dot{ 50%{ opacity:.35; } }

  /* Error banner */
  .error-banner{
    display:none;
    background:rgba(255,107,107,.12);
    border:1px solid rgba(255,107,107,.35);
    color:#ffd2d2;
    padding:12px 14px;
    border-radius:12px;
    font-size:13px;
    line-height:1.5;
    margin-bottom:14px;
  }
  .error-banner.show{ display:block; }
  .error-banner b{ color:#fff; }
  .error-banner button{
    margin-top:8px;
    background:rgba(255,255,255,.12);
    border:none; color:#fff; padding:6px 12px;
    border-radius:8px; font-size:12px; cursor:pointer;
  }

  /* Language toggle */
  .lang-row{ display:flex; gap:10px; margin-bottom:18px; }
  .lang-btn{
    flex:1;
    background:var(--pill-bg);
    border:1px solid rgba(255,255,255,.07);
    color:var(--text-dim);
    padding:14px 10px;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .lang-btn .native{ font-size:18px; }
  .lang-btn .english{ font-size:11px; font-weight:500; color:var(--text-dim); }
  .lang-btn.active{
    background:linear-gradient(145deg, var(--pill-active), #1a5dc4);
    color:#fff;
    border-color:transparent;
    box-shadow:0 4px 18px rgba(47,127,224,.4);
  }
  .lang-btn.active .english{ color:rgba(255,255,255,.85); }

  /* Center stage */
  .stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:10px 0 20px;
  }

  .avatar-ring{
    position:relative;
    width:168px; height:168px;
    display:flex; align-items:center; justify-content:center;
  }
  .avatar-ring::before{
    content:"";
    position:absolute; inset:0;
    border-radius:50%;
    background:radial-gradient(circle, rgba(95,195,255,.35), transparent 70%);
    filter:blur(6px);
    opacity:.6;
  }
  .avatar{
    width:128px; height:128px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #6fd0ff, #2f6fe0 55%, #16317a 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:46px;
    box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 10px 40px rgba(47,111,224,.5);
    position:relative; z-index:1;
    transition:transform .2s ease;
  }
  .stage.listening .avatar{ animation:breathe 1.4s ease-in-out infinite; }
  .stage.speaking .avatar{ animation:breathe 0.9s ease-in-out infinite; }
  .stage.thinking .avatar{ animation:spin-pulse 1.1s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.07); } }
  @keyframes spin-pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.55; } }

  .stage-label{ font-size:14px; color:var(--text-dim); font-weight:500; min-height:18px; }

  /* Captions */
  .captions{
    width:100%;
    min-height:74px;
    display:flex; flex-direction:column; gap:8px;
    align-items:center;
    text-align:center;
    padding:0 8px;
  }
  .caption-line{
    font-size:14px; line-height:1.45;
    max-width:100%;
    opacity:0;
    transform:translateY(4px);
    transition:opacity .25s ease, transform .25s ease;
  }
  .caption-line.show{ opacity:1; transform:translateY(0); }
  .caption-line.you{ color:#bcd4ff; }
  .caption-line.nova{ color:#fff; font-weight:500; }
  .caption-line b{ font-weight:700; opacity:.7; margin-right:4px; }

  /* Controls */
  .controls{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    padding-top:6px;
  }
  .call-btn{
    width:80px; height:80px; border-radius:50%;
    border:none; cursor:pointer;
    background:linear-gradient(145deg, #3fb87a, #1f8f57);
    box-shadow:0 8px 24px rgba(31,143,87,.45);
    display:flex; align-items:center; justify-content:center;
    font-size:30px;
    transition:transform .12s ease, background .2s ease, box-shadow .2s ease;
    color:#fff;
  }
  .call-btn:active{ transform:scale(.94); }
  .call-btn.recording{
    background:linear-gradient(145deg, #ff6b6b, #d23f3f);
    box-shadow:0 8px 26px rgba(210,63,63,.5);
    animation:rec-pulse 1.2s infinite;
  }
  @keyframes rec-pulse{
    0%{ box-shadow:0 0 0 0 rgba(255,107,107,.45); }
    70%{ box-shadow:0 0 0 18px rgba(255,107,107,0); }
    100%{ box-shadow:0 0 0 0 rgba(255,107,107,0); }
  }
  .call-btn:disabled{ opacity:.45; cursor:not-allowed; animation:none; }
  .hint{ font-size:12px; color:var(--text-dim); text-align:center; }
  .reset-link{
    background:none; border:none; color:var(--text-dim);
    font-size:12px; text-decoration:underline; cursor:pointer;
    padding:4px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark">L</div>
      <div class="brand-name">LinguaCall</div>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <div class="error-banner" id="errorBanner">
    <div><b>Something went wrong:</b> <span id="errorText"></span></div>
    <button id="errorRetry">Try again</button>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" data-lang="ur" id="btnUrdu">
      <span class="native">اردو</span>
      <span class="english">Urdu</span>
    </button>
    <button class="lang-btn" data-lang="ps" id="btnPashto">
      <span class="native">پښتو</span>
      <span class="english">Pashto</span>
    </button>
  </div>

  <div class="stage" id="stage">
    <div class="avatar-ring">
      <div class="avatar" id="avatarFace">🤖</div>
    </div>
    <div class="stage-label" id="stageLabel">Tap the call button and speak</div>

    <div class="captions" id="captions">
      <div class="caption-line you" id="youCaption"></div>
      <div class="caption-line nova" id="novaCaption"></div>
    </div>
  </div>

  <div class="controls">
    <button class="call-btn" id="callBtn" aria-label="Start talking">📞</button>
    <div class="hint" id="hintText">Tap once to talk, tap again when you're done</div>
    <button class="reset-link" id="resetLink">Reset conversation</button>
  </div>

</div>

<script>
(function(){
  const WORKER_URL = "https://weathered-salad-5b40.zapic78.workers.dev";

  const els = {
    statusPill: document.getElementById("statusPill"),
    statusText: document.getElementById("statusText"),
    errorBanner: document.getElementById("errorBanner"),
    errorText: document.getElementById("errorText"),
    errorRetry: document.getElementById("errorRetry"),
    btnUrdu: document.getElementById("btnUrdu"),
    btnPashto: document.getElementById("btnPashto"),
    stage: document.getElementById("stage"),
    stageLabel: document.getElementById("stageLabel"),
    youCaption: document.getElementById("youCaption"),
    novaCaption: document.getElementById("novaCaption"),
    callBtn: document.getElementById("callBtn"),
    hintText: document.getElementById("hintText"),
    resetLink: document.getElementById("resetLink"),
  };

  let sourceLang = "ur";
  let history = []; // {role:"user"|"nova", text}
  let mediaRecorder = null;
  let audioChunks = [];
  let mode = "idle"; // idle | listening | thinking | speaking
  let lastActionWasRecordStart = false;

  /* ---------- status / error UI ---------- */
  function setStatus(text, kind){
    els.statusText.textContent = text;
    els.statusPill.className = "status-pill" + (kind ? " " + kind : "");
  }
  function showError(msg){
    els.errorText.textContent = msg;
    els.errorBanner.classList.add("show");
    setStatus("Error", "error");
  }
  function clearError(){
    els.errorBanner.classList.remove("show");
  }
  els.errorRetry.addEventListener("click", () => {
    clearError();
    checkConnection();
  });

  /* ---------- language toggle ---------- */
  function setLang(lang){
    sourceLang = lang;
    els.btnUrdu.classList.toggle("active", lang === "ur");
    els.btnPashto.classList.toggle("active", lang === "ps");
  }
  els.btnUrdu.addEventListener("click", () => setLang("ur"));
  els.btnPashto.addEventListener("click", () => setLang("ps"));

  /* ---------- connectivity check on load ---------- */
  async function checkConnection(){
    setStatus("Connecting…");
    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ping: true }),
      });
      if (!res.ok) {
        showError("Worker responded with HTTP " + res.status + ". Check the worker is deployed and the URL is correct.");
        return;
      }
      const data = await res.json();
      if (data.error) {
        showError(data.error);
        return;
      }
      if (data.hasApiKey === false) {
        showError("Worker is reachable, but GEMINI_API_KEY is not set in Cloudflare. Add it under Worker → Settings → Variables.");
        return;
      }
      setStatus("Ready", "connected");
      clearError();
    } catch (err) {
      showError("Can't reach the worker at all (" + err.message + "). Check your internet connection and that the worker URL is correct.");
    }
  }
  checkConnection();

  /* ---------- stage visuals ---------- */
  function setMode(next, label){
    mode = next;
    els.stage.classList.remove("listening", "thinking", "speaking");
    if (next !== "idle") els.stage.classList.add(next);
    els.stageLabel.textContent = label;
  }
  function showCaption(el, speaker, text){
    el.innerHTML = "<b>" + speaker + "</b>" + text;
    el.classList.add("show");
  }

  /* ---------- mic / recording ---------- */
  els.callBtn.addEventListener("click", async () => {
    if (mode === "idle") {
      startRecording();
    } else if (mode === "listening") {
      stopRecording();
    }
    // ignore taps while thinking/speaking
  });

  async function startRecording(){
    clearError();
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      showError("This browser doesn't support microphone recording. Try Chrome or Edge.");
      return;
    }
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      showError("Microphone access was blocked. Allow microphone permission for this site, then tap the call button again.");
      return;
    }

    const mimeType = MediaRecorder.isTypeSupported("audio/webm")
      ? "audio/webm"
      : (MediaRecorder.isTypeSupported("audio/mp4") ? "audio/mp4" : "");
    try {
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    } catch (err) {
      showError("Couldn't start the recorder: " + err.message);
      return;
    }
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      handleRecordingStopped(mediaRecorder.mimeType || mimeType || "audio/webm");
    };
    mediaRecorder.start();

    els.callBtn.classList.add("recording");
    els.callBtn.textContent = "⏹";
    els.hintText.textContent = "Listening… tap again when you're done";
    setMode("listening", "Listening…");
  }

  function stopRecording(){
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.stop();
    }
    els.callBtn.classList.remove("recording");
    els.callBtn.textContent = "📞";
    els.callBtn.disabled = true;
  }

  function blobToBase64(blob){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result; // data:mime;base64,XXXX
        const base64 = result.split(",")[1] || "";
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function handleRecordingStopped(mimeType){
    if (audioChunks.length === 0) {
      showError("No audio was captured. Try speaking right after tapping the call button.");
      resetToIdle();
      return;
    }
    const blob = new Blob(audioChunks, { type: mimeType });
    if (blob.size < 800) {
      showError("That recording was too short. Hold the call a bit longer while you speak.");
      resetToIdle();
      return;
    }

    setMode("thinking", "Nova is thinking…");
    els.hintText.textContent = "Please wait…";

    try {
      const base64 = await blobToBase64(blob);
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          audio: base64,
          mimeType,
          sourceLang,
          history,
        }),
      });

      const data = await res.json().catch(() => null);

      if (!res.ok || !data || data.error) {
        showError((data && data.error) ? data.error : ("Server error (HTTP " + res.status + ")."));
        resetToIdle();
        return;
      }

      const transcript = data.transcript || "(no transcript)";
      const reply = data.reply || "Sorry, I didn't catch that — try again.";

      showCaption(els.youCaption, "You: ", transcript);
      showCaption(els.novaCaption, "Nova: ", reply);

      history.push({ role: "user", text: transcript });
      history.push({ role: "nova", text: reply });
      history = history.slice(-12);

      speakReply(reply);
    } catch (err) {
      showError("Couldn't reach Nova: " + err.message);
      resetToIdle();
    }
  }

  function speakReply(text){
    setMode("speaking", "Nova is speaking…");
    if (!("speechSynthesis" in window)) {
      // No TTS available — just go back to ready with captions shown
      resetToIdle();
      return;
    }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    utter.rate = 0.95;
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => /en-US/i.test(v.lang) && /female|samantha|zira|google/i.test(v.name)) 
                    || voices.find(v => /^en/i.test(v.lang));
    if (preferred) utter.voice = preferred;
    utter.onend = () => resetToIdle();
    utter.onerror = () => resetToIdle();
    speechSynthesis.speak(utter);
  }

  function resetToIdle(){
    setMode("idle", "Tap the call button and speak");
    els.hintText.textContent = "Tap once to talk, tap again when you're done";
    els.callBtn.disabled = false;
    els.callBtn.classList.remove("recording");
    els.callBtn.textContent = "📞";
  }

  els.resetLink.addEventListener("click", () => {
    history = [];
    els.youCaption.classList.remove("show");
    els.novaCaption.classList.remove("show");
    els.youCaption.textContent = "";
    els.novaCaption.textContent = "";
    resetToIdle();
  });

  // Warm up voice list (some browsers load it async)
  if ("speechSynthesis" in window) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
})();
</script>
</body>
</html>
