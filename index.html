<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="LinguaCall" />
<meta name="theme-color" content="#6c63ff" />
<title>LinguaCall — AI Language Tutor</title>
<style>
  :root{--bg:#0f1020;--panel:#1a1b2e;--accent:#6c63ff;--accent2:#ff6b9d;--text:#fff;--muted:#a0a3bd;--ok:#4ade80;--err:#f87171}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f1020,#1a1b2e);color:var(--text);min-height:100vh;padding:16px;padding-bottom:120px}
  h1{font-size:24px;margin-bottom:4px}
  .status{color:var(--muted);font-size:13px;margin-bottom:16px}
  .status.live{color:var(--ok)}
  .panel{background:var(--panel);border-radius:16px;padding:14px;margin-bottom:12px}
  .label{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:#2a2b45;border:none;color:var(--text);padding:8px 12px;border-radius:20px;font-size:13px;cursor:pointer;transition:.15s}
  .chip.active{background:var(--accent)}
  .stats{display:flex;justify-content:space-around;text-align:center;padding:10px 0}
  .stat-val{font-size:20px;font-weight:600}
  .stat-lbl{font-size:11px;color:var(--muted)}
  .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:36px;margin:8px auto;transition:.2s}
  .avatar.speaking{transform:scale(1.1);box-shadow:0 0 30px var(--accent)}
  .avatar.listening{box-shadow:0 0 30px var(--ok)}
  .nova-name{text-align:center;font-weight:600}
  .nova-sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:8px}
  .transcript{min-height:140px;max-height:260px;overflow-y:auto;padding:8px}
  .msg{margin-bottom:10px;padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.4}
  .msg.nova{background:#2a2b45}
  .msg.user{background:var(--accent);margin-left:30px}
  .msg .who{font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .tip{text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
  .controls{position:fixed;bottom:16px;left:16px;right:16px;display:flex;justify-content:space-around;background:var(--panel);padding:14px;border-radius:50px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .btn{width:56px;height:56px;border-radius:50%;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
  .btn.mic{background:#2a2b45}
  .btn.mic.on{background:var(--ok)}
  .btn.call{background:var(--accent);width:72px;height:72px;font-size:28px}
  .btn.call.on{background:var(--err)}
  .btn.skip{background:#2a2b45}
  audio{display:none}
</style>
</head>
<body>

<h1>🤖 LinguaCall</h1>
<div class="status" id="status">Ready</div>

<div class="panel">
  <div class="label">Learning</div>
  <div class="chips" id="learn-lang">
    <button class="chip active" data-v="en">🇺🇸 English</button>
    <button class="chip" data-v="es">🇪🇸 Spanish</button>
    <button class="chip" data-v="fr">🇫🇷 French</button>
    <button class="chip" data-v="ja">🇯🇵 Japanese</button>
    <button class="chip" data-v="ar">🇸🇦 Arabic</button>
    <button class="chip" data-v="de">🇩🇪 German</button>
    <button class="chip" data-v="zh">🇨🇳 Chinese</button>
    <button class="chip" data-v="pt">🇧🇷 Portuguese</button>
  </div>
</div>

<div class="panel">
  <div class="label">Your native language</div>
  <div class="chips" id="native-lang">
    <button class="chip active" data-v="none">None</button>
    <button class="chip" data-v="ur">اردو Urdu</button>
    <button class="chip" data-v="ps">پښتو Pashto</button>
    <button class="chip" data-v="fa">فارسی Persian</button>
    <button class="chip" data-v="es">Español</button>
  </div>
</div>

<div class="panel">
  <div class="label">Level</div>
  <div class="chips" id="level">
    <button class="chip active" data-v="beginner">🌱 Beginner</button>
    <button class="chip" data-v="medium">🔥 Medium</button>
    <button class="chip" data-v="advanced">⚡ Advanced</button>
  </div>
</div>

<div class="panel">
  <div class="label">Mode</div>
  <div class="chips" id="mode">
    <button class="chip active" data-v="freetalk">💬 Free Talk</button>
    <button class="chip" data-v="lesson">📚 Lesson</button>
    <button class="chip" data-v="interview">🎙️ Interview</button>
    <button class="chip" data-v="story">📖 Story</button>
  </div>
</div>

<div class="panel">
  <div class="avatar" id="avatar">🤖</div>
  <div class="nova-name">Nova</div>
  <div class="nova-sub">Your AI Language Companion</div>
  <div class="stats">
    <div><div class="stat-val" id="s-words">0</div><div class="stat-lbl">Words</div></div>
    <div><div class="stat-val" id="s-turns">0</div><div class="stat-lbl">Turns</div></div>
    <div><div class="stat-val" id="s-time">0:00</div><div class="stat-lbl">Time</div></div>
  </div>
  <div class="transcript" id="transcript">
    <div class="msg nova"><div class="who">Nova</div>Pick your language and level, then tap Call.</div>
  </div>
  <div class="tip" id="tip">Tap Call to start.</div>
</div>

<div class="controls">
  <button class="btn mic" id="btn-mic" title="Mic">🎤</button>
  <button class="btn call" id="btn-call" title="Call">📞</button>
  <button class="btn skip" id="btn-skip" title="Skip">⏭</button>
</div>

<script>
/* =========================================================================
   LinguaCall v3 — fast, interruptible, louder
   Replace WORKER_URL with your Cloudflare Worker endpoint.
   The worker must accept POST {messages, lang, level, mode, native}
   and stream Gemini's response as plain text chunks (SSE or chunked).
   ========================================================================= */
const WORKER_URL = "https://weathered-salad-5b40.zapic78.workers.dev"; // <-- EDIT THIS
const TTS_VOICE_HINT = ["Samantha","Google US English","Karen","Microsoft Aria"];

const $ = id => document.getElementById(id);
const state = {
  learn:"en", native:"none", level:"beginner", mode:"freetalk",
  inCall:false, listening:false, speaking:false,
  messages:[], words:0, turns:0, startedAt:0,
  recognition:null, audioCtx:null, gainNode:null,
  currentUtterance:null, micStream:null, vadAnalyser:null, vadRAF:null
};

/* ---------- chip selectors ---------- */
["learn-lang","native-lang","level","mode"].forEach(group=>{
  $(group).addEventListener("click", e=>{
    if(!e.target.classList.contains("chip"))return;
    [...$(group).children].forEach(c=>c.classList.remove("active"));
    e.target.classList.add("active");
    const key = group==="learn-lang"?"learn":group==="native-lang"?"native":group;
    state[key] = e.target.dataset.v;
  });
});

/* ---------- UI helpers ---------- */
function setStatus(t, live=false){ $("status").textContent=t; $("status").classList.toggle("live",live); }
function addMsg(who, text){
  const d=document.createElement("div");
  d.className="msg "+who;
  d.innerHTML=`<div class="who">${who==="nova"?"Nova":"You"}</div><span></span>`;
  d.querySelector("span").textContent=text;
  $("transcript").appendChild(d);
  $("transcript").scrollTop=$("transcript").scrollHeight;
  return d.querySelector("span");
}
function tip(t){ $("tip").textContent=t; }

/* ---------- AUDIO: gain-boosted TTS via Web Audio ---------- */
async function ensureAudio(){
  if(state.audioCtx) return;
  state.audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  state.gainNode = state.audioCtx.createGain();
  state.gainNode.gain.value = 1.8; // BOOST output ~80% above max
  state.gainNode.connect(state.audioCtx.destination);
}

function pickVoice(lang){
  const voices = speechSynthesis.getVoices();
  // prefer warm female voices in the learning language
  const langMatch = voices.filter(v=>v.lang.toLowerCase().startsWith(lang));
  for(const hint of TTS_VOICE_HINT){
    const v = langMatch.find(x=>x.name.includes(hint));
    if(v) return v;
  }
  return langMatch[0] || voices[0];
}

/* ---------- TTS with barge-in ---------- */
function speak(text){
  return new Promise(resolve=>{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = pickVoice(state.learn);
    u.lang = (u.voice && u.voice.lang) || state.learn;
    u.rate = 0.95;    // warmer pacing
    u.pitch = 1.0;
    u.volume = 1.0;
    state.currentUtterance = u;
    state.speaking = true;
    $("avatar").classList.add("speaking");
    u.onend = u.onerror = ()=>{
      state.speaking=false;
      $("avatar").classList.remove("speaking");
      state.currentUtterance=null;
      resolve();
    };
    speechSynthesis.speak(u);
  });
}
function stopSpeaking(){
  speechSynthesis.cancel();
  state.speaking=false;
  $("avatar").classList.remove("speaking");
}

/* ---------- VAD: barge-in detection while Nova speaks ---------- */
function startVAD(){
  if(!state.micStream) return;
  const src = state.audioCtx.createMediaStreamSource(state.micStream);
  const analyser = state.audioCtx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);
  state.vadAnalyser = analyser;
  const data = new Uint8Array(analyser.frequencyBinCount);
  const loop = ()=>{
    analyser.getByteFrequencyData(data);
    let sum=0; for(let i=0;i<data.length;i++) sum+=data[i];
    const energy = sum/data.length;
    if(state.speaking && energy > 35){ // user interrupted
      stopSpeaking();
      tip("Got it — listening...");
    }
    state.vadRAF = requestAnimationFrame(loop);
  };
  loop();
}
function stopVAD(){ if(state.vadRAF) cancelAnimationFrame(state.vadRAF); state.vadRAF=null; }

/* ---------- STT: fast, continuous ---------- */
function buildRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("Your browser doesn't support speech recognition. Use Chrome/Edge."); return null; }
  const r = new SR();
  r.continuous = false;           // one utterance per turn
  r.interimResults = true;        // faster partial feedback
  r.maxAlternatives = 1;
  r.lang = ({en:"en-US",es:"es-ES",fr:"fr-FR",ja:"ja-JP",ar:"ar-SA",de:"de-DE",zh:"zh-CN",pt:"pt-BR"})[state.learn]||"en-US";
  return r;
}

function listenOnce(){
  return new Promise((resolve,reject)=>{
    const r = buildRecognition();
    if(!r) return reject("no-stt");
    state.recognition = r;
    state.listening = true;
    $("avatar").classList.add("listening");
    setStatus("Listening...",true);
    let finalText = "";
    let lastInterimAt = Date.now();
    let silenceTimer = null;

    r.onresult = e=>{
      let interim = "";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t = e.results[i][0].transcript;
        if(e.results[i].isFinal) finalText += t;
        else interim += t;
      }
      lastInterimAt = Date.now();
      // fast cutoff: if user pauses > 700ms after some speech, end early
      if(silenceTimer) clearTimeout(silenceTimer);
      if(finalText || interim){
        silenceTimer = setTimeout(()=>{
          try{ r.stop(); }catch(e){}
        }, 700);
      }
    };
    r.onerror = ev=>{
      state.listening=false;
      $("avatar").classList.remove("listening");
      reject(ev.error);
    };
    r.onend = ()=>{
      state.listening=false;
      $("avatar").classList.remove("listening");
      resolve(finalText.trim());
    };
    try{ r.start(); }catch(e){ reject(e); }
  });
}

/* ---------- LLM: streaming call to Worker ---------- */
async function streamReply(userText){
  state.messages.push({role:"user", content:userText});
  const sysPrompt =
    `You are Nova, a warm, encouraging language tutor helping the user practice ${state.learn}. ` +
    `User level: ${state.level}. Mode: ${state.mode}. ` +
    `Reply in 1–2 SHORT sentences max (under 25 words). ` +
    `End with one simple follow-up question. ` +
    `Never lecture. Never correct harshly. ` +
    `Speak ONLY in ${state.learn} unless the user is stuck.`;

  const res = await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      system: sysPrompt,
      messages: state.messages.slice(-10), // short context = fast
      lang: state.learn,
      level: state.level,
      mode: state.mode,
      native: state.native,
      maxTokens: 120,
      stream: true
    })
  });

  if(!res.ok || !res.body){
    const fallback = "Sorry, I couldn't reach the server. Try again?";
    addMsg("nova", fallback);
    await speak(fallback);
    return;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  const span = addMsg("nova","");
  let full = "";
  let sentenceBuf = "";
  let firstSpoken = false;

  while(true){
    const {value, done} = await reader.read();
    if(done) break;
    const chunk = decoder.decode(value,{stream:true});
    // accept either raw text or SSE "data: ..." lines
    const cleaned = chunk.replace(/^data:\s?/gm,"").replace(/\[DONE\]/g,"");
    full += cleaned;
    sentenceBuf += cleaned;
    span.textContent = full;
    $("transcript").scrollTop=$("transcript").scrollHeight;

    // speak first sentence as soon as we have it (cuts perceived latency)
    if(!firstSpoken){
      const m = sentenceBuf.match(/^(.+?[.!?؟。！？])\s/);
      if(m){
        firstSpoken = true;
        const first = m[1];
        sentenceBuf = sentenceBuf.slice(m[0].length);
        speak(first); // don't await — keep reading stream
      }
    }
  }
  // speak any remainder
  const tail = (firstSpoken ? sentenceBuf : full).trim();
  if(tail) await speak(tail);

  state.messages.push({role:"assistant", content:full});
  state.turns++;
  state.words += userText.split(/\s+/).filter(Boolean).length;
  $("s-turns").textContent = state.turns;
  $("s-words").textContent = state.words;
}

/* ---------- Call loop ---------- */
async function startCall(){
  await ensureAudio();
  if(state.audioCtx.state==="suspended") await state.audioCtx.resume();
  try{
    state.micStream = await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,
        noiseSuppression:true,
        autoGainControl:true,
        sampleRate:48000,
        channelCount:1
      }
    });
  }catch(e){ alert("Mic permission required."); return; }

  state.inCall=true;
  state.startedAt=Date.now();
  $("btn-call").classList.add("on");
  $("btn-call").textContent="✕";
  startVAD();

  const greeting = ({
    en:"Hi! I'm Nova. What's on your mind today?",
    es:"¡Hola! Soy Nova. ¿De qué quieres hablar?",
    fr:"Salut! Je suis Nova. De quoi veux-tu parler?",
    ja:"こんにちは!ノヴァです。今日は何を話したい?",
    ar:"مرحبا! أنا نوفا. عن ماذا تريد التحدث؟",
    de:"Hi! Ich bin Nova. Worüber möchtest du sprechen?",
    zh:"你好!我是Nova。今天想聊什么?",
    pt:"Oi! Eu sou Nova. Sobre o que quer falar?"
  })[state.learn] || "Hi! I'm Nova. What's on your mind?";
  addMsg("nova", greeting);
  await speak(greeting);

  // conversation loop
  while(state.inCall){
    try{
      tip("Speak now");
      const text = await listenOnce();
      if(!state.inCall) break;
      if(!text){ tip("Didn't catch that — try again"); continue; }
      addMsg("user", text);
      setStatus("Thinking...",true);
      await streamReply(text);
      setStatus("In call",true);
    }catch(err){
      if(err==="no-speech"||err==="aborted"){ continue; }
      console.error(err);
      tip("Error: "+err);
      await new Promise(r=>setTimeout(r,500));
    }
  }
}

function endCall(){
  state.inCall=false;
  try{ state.recognition && state.recognition.abort(); }catch(e){}
  stopSpeaking();
  stopVAD();
  if(state.micStream){ state.micStream.getTracks().forEach(t=>t.stop()); state.micStream=null; }
  $("btn-call").classList.remove("on");
  $("btn-call").textContent="📞";
  setStatus("Call ended");
  tip("Tap Call to start.");
}

/* ---------- buttons ---------- */
$("btn-call").addEventListener("click", ()=>{
  if(state.inCall) endCall(); else startCall();
});
$("btn-mic").addEventListener("click", ()=>{
  // toggle mute
  if(!state.micStream) return;
  const t = state.micStream.getAudioTracks()[0];
  t.enabled = !t.enabled;
  $("btn-mic").classList.toggle("on", t.enabled);
});
$("btn-skip").addEventListener("click", ()=>{
  // skip Nova's current sentence
  stopSpeaking();
});

/* ---------- timer ---------- */
setInterval(()=>{
  if(!state.inCall) return;
  const s = Math.floor((Date.now()-state.startedAt)/1000);
  $("s-time").textContent = Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
},500);

/* preload voices */
window.speechSynthesis && speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged = ()=>speechSynthesis.getVoices();
</script>
</body>
</html>
