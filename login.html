<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" />
<title>Log in — Lingua Companion AI</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <div class="auth-wrap">
    <div class="brand">
      <div class="brand-mark">L</div>
      <div class="brand-name">Lingua Companion AI</div>
    </div>
    <h2>Welcome back</h2>
    <p class="sub">Log in to continue your streak</p>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password" minlength="6" />
      </div>
      <button class="btn" type="submit" id="submitBtn">Log in</button>
      <button class="btn ghost" type="button" id="forgotBtn" style="margin-top:8px">Forgot password?</button>
    </form>

    <div class="switch">New here? <a href="signup.html">Create an account</a></div>
  </div>
</div>

<script type="module">
  import {
    auth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged
  } from "./firebase.js";
  import { $, toast, setBusy, redirectIfAuthed } from "./app.js";

  redirectIfAuthed();

  $("#loginForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const email = $("#email").value.trim();
    const password = $("#password").value;
    const btn = $("#submitBtn");
    setBusy(btn,true,"Signing in");
    try{
      await signInWithEmailAndPassword(auth, email, password);
      location.href = "dashboard.html";
    }catch(err){
      toast(err.message.replace("Firebase: ","").replace(/\(auth.*\)/,""));
      setBusy(btn,false);
    }
  });

  $("#forgotBtn").addEventListener("click", async ()=>{
    const email = $("#email").value.trim();
    if(!email) return toast("Enter your email first");
    try{
      await sendPasswordResetEmail(auth, email);
      toast("Reset email sent");
    }catch(err){ toast(err.message); }
  });
</script>
</body>
</html>
